name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.13

      - run: uv sync

      - name: Build datasets
        run: |
          datasets=()
          for d in datasets/*/; do
            name="$(basename "$d")"
            # TODO: e_stat は dwh 依存先の Cloudflare 問題が解決するまでスキップ
            [ "$name" = "e_stat" ] && continue
            [ -f "$d/dataset.yml" ] && [ "$name" != "catalog" ] && datasets+=("$d")
          done
          for d in "${datasets[@]}"; do uv run queria fetch "$d"; done
          for d in "${datasets[@]}"; do uv run queria run "$d" --target prd; done
          for d in "${datasets[@]}"; do uv run queria freeze "$d"; done

      - name: Build catalog
        run: |
          uv run queria fetch datasets/catalog
          uv run queria run datasets/catalog --target prd
          uv run queria freeze datasets/catalog

      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\": [{\"title\": \"Deploy Failed\", \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"color\": 15158332, \"fields\": [{\"name\": \"Repository\", \"value\": \"${{ github.repository }}\"}, {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\"}, {\"name\": \"Commit\", \"value\": \"${{ github.sha }}\"}]}]}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"
