name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      datasets: ${{ steps.find.outputs.datasets }}
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: datasets

      - name: List datasets (excluding catalog)
        id: find
        run: |
          datasets=$(ls -d datasets/*/dataset.yml \
            | xargs -I{} dirname {} \
            | xargs -I{} basename {} \
            | grep -v catalog \
            | jq -Rsc 'split("\n") | map(select(length > 0))')
          echo "datasets=$datasets" >> "$GITHUB_OUTPUT"

  deploy-dataset:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        dataset: ${{ fromJson(needs.discover.outputs.datasets) }}
    env:
      PYTHONUNBUFFERED: "1"
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
      ESTAT_API_KEY: ${{ secrets.ESTAT_API_KEY }}
      REINFOLIB_API_KEY: ${{ secrets.REINFOLIB_API_KEY }}
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.13

      - run: uv sync --all-packages

      - name: Build and deploy ${{ matrix.dataset }}
        env:
          DUCKLAKE_STORAGE: "s3://${{ vars.S3_BUCKET }}/${{ matrix.dataset }}"
        run: |
          cd "datasets/${{ matrix.dataset }}"
          uv run fdl pull

          # 中断時にカタログをS3に保全（データファイルは既にS3上にある）
          trap 'echo "--- interrupted: pushing catalog ---"; uv run fdl push' INT TERM

          uv run python pipeline.py
          uv run fdl metadata
          uv run fdl push

  deploy-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: deploy-dataset
    if: ${{ !cancelled() }}
    env:
      PYTHONUNBUFFERED: "1"
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.13

      - run: uv sync --all-packages

      - name: Build and deploy catalog
        env:
          DUCKLAKE_STORAGE: "s3://${{ vars.S3_BUCKET }}/catalog"
        run: |
          cd datasets/catalog
          uv run fdl pull
          uv run python pipeline.py
          uv run fdl metadata
          uv run fdl push

      - name: Sync catalog to D1
        run: uv run --with cloudflare python scripts/sync_catalog_d1.py

  notify-failure:
    runs-on: ubuntu-latest
    needs: [deploy-dataset, deploy-catalog]
    if: failure()
    steps:
      - name: Notify Discord on failure
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\": [{\"title\": \"Deploy Failed\", \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"color\": 15158332, \"fields\": [{\"name\": \"Repository\", \"value\": \"${{ github.repository }}\"}, {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\"}, {\"name\": \"Commit\", \"value\": \"${{ github.sha }}\"}]}]}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"
