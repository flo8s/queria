name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv python install 3.13

      - run: uv sync

      - name: Build datasets
        run: |
          datasets=()
          for d in datasets/*/; do
            [ -f "$d/dataset.yml" ] && [ "$(basename "$d")" != "catalog" ] && datasets+=("$d")
          done
          for d in "${datasets[@]}"; do uv run queria fetch "$d"; done
          for d in "${datasets[@]}"; do uv run queria run "$d" --target prd; done
          for d in "${datasets[@]}"; do uv run queria freeze "$d"; done

      - name: Build catalog
        run: |
          uv run queria fetch datasets/catalog
          uv run queria run datasets/catalog --target prd
          uv run queria freeze datasets/catalog
