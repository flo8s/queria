  - name: raw_estat_data_catalog
    description: E-Stat データカタログ（データセット・リソース情報）
    columns:
      - name: aid
        description: 統計表ID
      - name: dataset__stat_name
        description: 政府統計名 (STRUCT)
      - name: dataset__organization
        description: 作成機関 (STRUCT)
