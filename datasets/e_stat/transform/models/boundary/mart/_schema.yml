version: 2

models:
  - name: boundary_small_area
    description: 国勢調査2020 小地域（町丁・字等）境界データ
    access: public
    config:
      meta:
        title: "小地域（町丁・字等）境界"
        tags: ["GIS", "境界", "小地域", "国勢調査"]
        license: "利用規約に基づく"
        license_url: "https://www.e-stat.go.jp/terms-of-use"
        source_url: "https://www.e-stat.go.jp/gis/statmap-search?type=2"
        published: true
    columns:
      - name: key_code
