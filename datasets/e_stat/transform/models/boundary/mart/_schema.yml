      - name: pref_name
        meta:
          title: 都道府県名
      - name: city_code
        meta:
          title: 市区町村コード
      - name: city_name
        meta:
          title: 市区町村名
      - name: area_name
        meta:
          title: 町丁字等名
      - name: area_sqm
        meta:
          title: 面積（㎡）
      - name: perimeter_m
        meta:
          title: 周囲長（m）
      - name: population
        meta:
          title: 人口
      - name: households
        meta:
          title: 世帯数
      - name: geometry
