catalog:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: ":memory:"
      database: catalog
      schema: main
      threads: 1
      extensions:
        - httpfs
        - ducklake
      attach:
        - path: "ducklake:../dist/ducklake.duckdb"
          alias: catalog
          is_ducklake: true
          options:
            DATA_PATH: "../dist/ducklake.duckdb.files/"
            OVERRIDE_DATA_PATH: true
    prd:
      type: duckdb
      path: ":memory:"
      database: catalog
      schema: main
      threads: 1
      extensions:
        - httpfs
        - ducklake
      settings:
        s3_url_style: path
        s3_access_key_id: "{{ env_var('S3_ACCESS_KEY_ID') }}"
        s3_secret_access_key: "{{ env_var('S3_SECRET_ACCESS_KEY') }}"
        s3_endpoint: "{{ env_var('S3_ENDPOINT') }}"
        s3_region: auto
      attach:
        - path: "ducklake:../dist/ducklake.duckdb"
          alias: catalog
          is_ducklake: true
          options:
            DATA_PATH: "s3://{{ env_var('S3_BUCKET') }}/catalog/ducklake.duckdb.files/"
            OVERRIDE_DATA_PATH: true
