    description: つくば市データセットの metadata.json を HTTP 経由で読み込んだ生データ
    columns:
      - name: datasource
        data_type: varchar
      - name: title
        data_type: varchar
      - name: description
        data_type: varchar
      - name: tags
        data_type: json
      - name: ducklake_url
