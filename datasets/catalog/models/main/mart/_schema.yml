version: 2

models:
  - name: mart_datasets
    description: データセット一覧
    access: public
    config:
      contract:
        enforced: true
      meta:
        title: "データセット一覧"
        tags: ["カタログ"]
        published: true
    columns:
      - name: datasource
        description: データセット識別子
        data_type: VARCHAR
      - name: title
        description: データセットのタイトル
        data_type: VARCHAR
      - name: description
        description: データセットの説明
        data_type: VARCHAR
      - name: cover
        description: カバー画像URLまたは絵文字
        data_type: VARCHAR
      - name: ducklake_url
        description: DuckLake の公開 URL
        data_type: VARCHAR
      - name: tags_json
        description: タグ（JSON 配列）
        data_type: JSON
      - name: readme
        description: データセットの説明（Markdown）
        data_type: VARCHAR

  - name: mart_schemas
    description: データセットのスキーマ一覧
    access: public
    config:
      contract:
        enforced: true
      meta:
        title: "スキーマ一覧"
        tags: ["カタログ"]
        published: true
    columns:
      - name: datasource
        description: データセット識別子
        data_type: VARCHAR
      - name: schema_name
        description: スキーマ名
        data_type: VARCHAR
      - name: title
        description: スキーマのタイトル
        data_type: VARCHAR

  - name: mart_tables
    description: テーブル・ビュー一覧
    access: public
    config:
      contract:
        enforced: true
      meta:
        title: "テーブル一覧"
        tags: ["カタログ"]
        published: true
    columns:
      - name: datasource
        description: データセット識別子
        data_type: VARCHAR
      - name: node_id
        description: dbt ノード ID
        data_type: VARCHAR
      - name: node_index
        description: manifest.json 内の出現順序
        data_type: INTEGER
      - name: name
        description: テーブル名
        data_type: VARCHAR
      - name: schema_name
        description: スキーマ名
        data_type: VARCHAR
      - name: description
        description: テーブルの説明
        data_type: VARCHAR
      - name: materialized
        description: マテリアライゼーション種別（table/view/incremental）
        data_type: VARCHAR
      - name: title
        description: テーブルのタイトル
        data_type: VARCHAR
      - name: license
        description: ライセンス
        data_type: VARCHAR
      - name: license_url
        description: ライセンス URL
        data_type: VARCHAR
      - name: source_url
        description: データソース URL
        data_type: VARCHAR
      - name: is_published
        description: 公開フラグ
        data_type: BOOLEAN
      - name: tags_json
        description: タグ（JSON 配列）
        data_type: JSON
      - name: sql
        description: コンパイル済み SQL
        data_type: VARCHAR

  - name: mart_columns
    description: カラム定義一覧
    access: public
    config:
      contract:
        enforced: true
      meta:
        title: "カラム一覧"
        tags: ["カタログ"]
        published: true
    columns:
      - name: datasource
        description: データセット識別子
        data_type: VARCHAR
      - name: node_id
        description: dbt ノード ID
        data_type: VARCHAR
      - name: table_name
        description: テーブル名
        data_type: VARCHAR
      - name: column_name
        description: カラム名
        data_type: VARCHAR
      - name: column_index
        description: カラムの定義順序
        data_type: INTEGER
      - name: title
        description: カラムの論理名
        data_type: VARCHAR
      - name: description
        description: カラムの説明
        data_type: VARCHAR
      - name: data_type
        description: データ型
        data_type: VARCHAR
      - name: nullable
        description: NULL許容フラグ
        data_type: BOOLEAN

  - name: mart_search_entries
    description: 全文検索用エントリ
    access: public
    config:
      meta:
        title: "検索エントリ"
        tags: ["カタログ"]
        published: true
    columns:
      - name: entry_type
        description: エントリ種別（table/column）
      - name: datasource
        description: データセット識別子
      - name: schema_name
        description: スキーマ名
      - name: table_name
        description: テーブル名
      - name: table_title
        description: テーブルタイトル
      - name: column_name
        description: カラム名
      - name: description
        description: 説明文
      - name: search_text
        description: 検索対象テキスト（生テキスト連結）
      - name: href
        description: リンクパス

  - name: mart_dependencies
    description: データセット間の依存関係
    access: public
    config:
      contract:
        enforced: true
      meta:
        title: "データセット依存関係"
        tags: ["カタログ"]
        published: true
    columns:
      - name: datasource
        description: データセット識別子
        data_type: VARCHAR
      - name: alias
        description: 依存先のエイリアス
        data_type: VARCHAR
      - name: ducklake_url
        description: 依存先の DuckLake URL
        data_type: VARCHAR
