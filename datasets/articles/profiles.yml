articles:
  target: default
  outputs:
    default:
      type: duckdb
      path: ":memory:"
      database: articles
      schema: main
      threads: 1
      extensions:
        - httpfs
        - ducklake
        - sqlite
      settings:
        s3_url_style: path
        s3_access_key_id: "{{ env_var('S3_ACCESS_KEY_ID', '') }}"
        s3_secret_access_key: "{{ env_var('S3_SECRET_ACCESS_KEY', '') }}"
        s3_endpoint: "{{ env_var('S3_ENDPOINT', '') }}"
        s3_region: auto
      attach:
        - path: "ducklake:.fdl/ducklake.duckdb"
          alias: articles
          is_ducklake: true
          options:
            DATA_PATH: "{{ env_var('DUCKLAKE_STORAGE', 'dist') }}/ducklake.duckdb.files/"
            OVERRIDE_DATA_PATH: true
