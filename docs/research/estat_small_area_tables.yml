# e-Stat 小地域（町丁・字等）統計表一覧
#
# getStatsList API (searchKind=2) から取得した小地域統計表の設定ファイル。
# 各テーブルは都道府県ごとに分割されており（47テーブル/パターン/年）、
# statsDataId は特定の都道府県の1件を示すサンプルID。
# 全都道府県分を取得するには getStatsList API で該当調査のテーブル一覧を再取得する。
# id_range は参考値（ID が連続しない場合あり）。
#
# 調査日: 2026-03-02
# 総テーブル数: 2,632件（小地域のみ、地域メッシュ 4,903件を除く）

# ==============================================================================
# 国勢調査（00200521）
# 最新: 2020年（令和2年）、過去: 2000, 2005, 2010, 2015
# 全テーブル: 2,209件
# ==============================================================================
tables:
  # --- 人口 ---
  - name: small_area_population
    description: 小地域 男女別人口総数及び世帯総数
    source_survey: 国勢調査
    survey_year: 2020
    statsDataId: "8003006726"  # 北海道
    id_range: "8003006700-8003006746"
    merge_keys: [cat01, cat02, area]
    notes: |
      cat01: 人口総数/男/女/世帯総数（4 classes）
      cat02: 秘匿地域・合算地域フラグ（3 classes）

  - name: small_area_age
    description: 小地域 年齢（5歳階級、4区分）別、男女別人口
    source_survey: 国勢調査
    survey_year: 2020
    statsDataId: "8003006768"  # 福岡県
    id_range: "8003006747-8003006793"
    merge_keys: [cat01, cat02, area]
    notes: |
      cat01: 年齢5歳階級×男女（60 classes）
      cat02: 秘匿地域・合算地域フラグ（3 classes）

  # --- 世帯 ---
