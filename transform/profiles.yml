transform:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: ":memory:"
      database: queria
      schema: main
      threads: 1
      extensions:
        - httpfs
        - ducklake
      attach:
        - path: "ducklake:queria.ducklake"
          alias: queria
          is_ducklake: true
          options:
            DATA_PATH: "queria.ducklake.files/"
            OVERRIDE_DATA_PATH: true
    prd:
      type: duckdb
      path: ":memory:"
      database: queria
      schema: main
      threads: 1
      extensions:
        - httpfs
        - ducklake
      settings:
        s3_url_style: path
        s3_access_key_id: "{{ env_var('R2_ACCESS_KEY_ID') }}"
        s3_secret_access_key: "{{ env_var('R2_SECRET_ACCESS_KEY') }}"
        s3_endpoint: "{{ env_var('CLOUDFLARE_ACCOUNT_ID') }}.r2.cloudflarestorage.com"
        s3_region: auto
      attach:
        - path: "ducklake:queria.ducklake"
          alias: queria
          is_ducklake: true
          options:
            DATA_PATH: "{{ env_var('R2_S3_DATA_PATH') }}"
            OVERRIDE_DATA_PATH: true
